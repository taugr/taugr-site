<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <clipPath id="globe-mask">
      <circle cx="100" cy="100" r="95" />
    </clipPath>
    
    <filter id="node-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g clip-path="url(#globe-mask)">
    <circle cx="100" cy="100" r="100" fill="#e8f5e9" />
    
    <ellipse cx="60" cy="70" rx="65" ry="45" fill="#2e8b57" opacity="0.65" transform="rotate(-30 60 70)"/>
    <ellipse cx="145" cy="80" rx="70" ry="50" fill="#3cb371" opacity="0.65" transform="rotate(25 145 80)"/>
    <ellipse cx="100" cy="150" rx="80" ry="55" fill="#1b5e20" opacity="0.65" transform="rotate(-15 100 150)"/>
    <ellipse cx="45" cy="135" rx="50" ry="70" fill="#4caf50" opacity="0.6" transform="rotate(40 45 135)"/>
    <ellipse cx="165" cy="140" rx="55" ry="65" fill="#006400" opacity="0.5" transform="rotate(-40 165 140)"/>
    <ellipse cx="100" cy="40" rx="70" ry="40" fill="#66bb6a" opacity="0.6"/>
    <ellipse cx="100" cy="100" rx="50" ry="50" fill="#81c784" opacity="0.4"/>
  </g>

  <ellipse cx="100" cy="100" rx="90" ry="30" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="4 6" opacity="0.6" transform="rotate(-20 100 100)"/>
  <ellipse cx="100" cy="100" rx="90" ry="30" fill="none" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.7" transform="rotate(40 100 100)"/>

  <g stroke="#ffffff" stroke-width="1.5" opacity="0.85">
    <line x1="100" y1="45" x2="55" y2="85" />
    <line x1="100" y1="45" x2="145" y2="85" />
    <line x1="55" y1="85" x2="100" y2="105" />
    <line x1="145" y1="85" x2="100" y2="105" />
    <line x1="55" y1="85" x2="70" y2="145" />
    <line x1="145" y1="85" x2="130" y2="145" />
    <line x1="100" y1="105" x2="70" y2="145" />
    <line x1="100" y1="105" x2="130" y2="145" />
    <line x1="70" y1="145" x2="100" y2="165" />
    <line x1="130" y1="145" x2="100" y2="165" />
    
    <line x1="100" y1="45" x2="100" y2="105" />
    <line x1="100" y1="105" x2="100" y2="165" />
  </g>

  <g fill="#ffffff" stroke="#1b5e20" stroke-width="2" filter="url(#node-glow)">
    <circle cx="100" cy="45" r="4.5" />
    <circle cx="55" cy="85" r="4.5" />
    <circle cx="145" cy="85" r="4.5" />
    <circle cx="70" cy="145" r="4.5" />
    <circle cx="130" cy="145" r="4.5" />
    <circle cx="100" cy="165" r="4.5" />

    <circle cx="100" cy="105" r="9" fill="#a5d6a7" stroke="#ffffff" stroke-width="2.5" />
    <circle cx="100" cy="105" r="3" fill="#1b5e20" stroke="none" />
  </g>
</svg>
